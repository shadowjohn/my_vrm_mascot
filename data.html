<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alicia Pose Library</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07110d;
      --panel: #102018;
      --panel-2: #16261e;
      --line: rgba(166, 244, 197, 0.22);
      --text: #edf7ef;
      --muted: #a8b8ad;
      --accent: #92e68e;
      --warn: #ffd166;
      --bad: #ff7a7a;
      --blue: #7fc7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      letter-spacing: 0;
    }

    a { color: inherit; text-decoration: none; }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 17, 13, 0.96);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .side {
      position: sticky;
      top: 92px;
      max-height: calc(100vh - 106px);
      overflow: auto;
      padding: 16px;
    }

    .content {
      min-width: 0;
      overflow: hidden;
    }

    .toolbar,
    .filters,
    .form-grid {
      display: grid;
      gap: 10px;
    }

    .toolbar {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .filters {
      grid-template-columns: 220px minmax(220px, 1fr) 160px auto;
      align-items: end;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select,
    textarea,
    button {
      min-height: 38px;
      border: 1px solid rgba(166, 244, 197, 0.24);
      border-radius: 6px;
      background: #0b1711;
      color: var(--text);
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    button,
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 800;
    }

    button.primary,
    .button.primary {
      border-color: rgba(146, 230, 142, 0.62);
      background: #3f873b;
    }

    button.warn { background: #634c13; color: #ffe8a3; }
    button.bad { background: #692325; color: #ffe1e1; }
    button.blue { background: #174363; color: #dff1ff; }
    button:disabled { opacity: 0.55; cursor: wait; }

    .section-title {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 18px;
    }

    .block + .block {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 170px);
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid rgba(166, 244, 197, 0.14);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0d1b14;
      color: #dff8df;
      font-size: 13px;
    }

    .preview {
      width: 112px;
      height: 72px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #06100b;
    }

    .preview video,
    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-card {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      color: var(--muted);
      font-size: 12px;
    }

    .title {
      max-width: 280px;
      font-weight: 800;
      word-break: break-all;
    }

    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(146, 230, 142, 0.16);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .badge.processing { color: var(--warn); }
    .badge.failed { color: var(--bad); }
    .badge.queued { color: var(--blue); }

    .progress {
      width: 180px;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
    }

    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #82e68c, #ffd166);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 280px;
    }

    .actions button,
    .actions .button {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .log {
      max-height: 180px;
      overflow: auto;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #06100b;
      color: #c8facc;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .side { position: static; max-height: none; }
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Alicia Pose Library</h1>
      <p class="sub">SQLite 姿勢素材庫 / GVHMR / VRMA / 圖片與影片來源管理</p>
    </div>
    <nav class="toolbar" aria-label="主要連結">
      <a class="button" href="index.html">首頁</a>
      <a class="button primary" href="motion_capture_lab.html">Motion Lab</a>
    </nav>
  </header>

  <main>
    <aside class="panel side">
      <section class="block">
        <h2 class="section-title">分類管理</h2>
        <div class="form-grid">
          <label>分類名稱
            <input id="kindName" placeholder="自然站姿、單手插腰、拳擊...">
          </label>
          <label>角色
            <input id="kindCharacter" value="alicia">
          </label>
          <button class="primary" id="createKindBtn">新增分類</button>
        </div>
      </section>

      <section class="block">
        <h2 class="section-title">建立素材</h2>
        <div class="form-grid">
          <label>分類
            <select id="itemKind"></select>
          </label>
          <label>標題
            <input id="itemTitle" placeholder="素材名稱">
          </label>
          <label>來源類型
            <select id="itemSourceKind">
              <option value="youtube">youtube</option>
              <option value="local_mp4">local_mp4</option>
              <option value="image">image</option>
              <option value="vrma">vrma</option>
              <option value="pose_json">pose_json</option>
            </select>
          </label>
          <label>來源 URL / 路徑
            <input id="itemSourceUrl" placeholder="youtube URL、mp4、image、vrma、json 路徑">
          </label>
          <label>姿勢用途
            <textarea id="itemPurpose" placeholder="例如：拳擊防守、走路、自然站姿"></textarea>
          </label>
          <button class="primary" id="createItemBtn">建立素材</button>
        </div>
      </section>

      <section class="block">
        <h2 class="section-title">匯入</h2>
        <div class="form-grid">
          <button class="blue" id="importDemoBtn">匯入 GVHMR Demo</button>
          <button class="blue" id="importVrmaBtn">匯入 VRMA Samples</button>
          <p class="note">匯入會去重，已存在的 `source_kind + source_url` 不會重複建立。</p>
        </div>
      </section>

      <section class="block">
        <h2 class="section-title">訊息</h2>
        <div class="log" id="messageLog">Ready.</div>
      </section>
    </aside>

    <section class="panel content">
      <div class="filters">
        <label>分類
          <select id="filterKind"></select>
        </label>
        <label>搜尋
          <input id="filterQ" placeholder="搜尋標題、來源、用途...">
        </label>
        <label>狀態
          <select id="filterStatus">
            <option value="">全部</option>
            <option value="0">待處理</option>
            <option value="1">轉檔中</option>
            <option value="2">已轉檔</option>
            <option value="3">轉檔失敗</option>
          </select>
        </label>
        <button class="primary" id="refreshBtn">重新整理</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" aria-label="全選"></th>
              <th>預覽</th>
              <th>標題</th>
              <th>類別</th>
              <th>來源</th>
              <th>狀態</th>
              <th>進度</th>
              <th>Frames</th>
              <th>建立時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="itemsBody">
            <tr><td colspan="10">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const state = { kinds: [], items: [], busy: false };
    const statusMap = {
      0: { label: '待處理', cls: 'queued' },
      1: { label: '轉檔中', cls: 'processing' },
      2: { label: '已轉檔', cls: 'done' },
      3: { label: '失敗', cls: 'failed' },
    };

    function logMessage(message) {
      const el = document.getElementById('messageLog');
      el.textContent = `[${new Date().toLocaleTimeString()}] ${message}\n` + el.textContent;
    }

    function setBusy(value) {
      state.busy = value;
      document.querySelectorAll('button').forEach((button) => { button.disabled = value; });
    }

    async function apiJson(url, options = {}) {
      const response = await fetch(url, {
        cache: 'no-store',
        headers: options.body ? { 'Content-Type': 'application/json' } : undefined,
        ...options,
      });
      const body = await response.json();
      if (!response.ok || body.ok === false) {
        throw new Error(body.error || `HTTP ${response.status}`);
      }
      return body;
    }

    function assetUrl(path) {
      if (!path) return '';
      if (/^https?:\/\//.test(path) || path.startsWith('/')) return path;
      return encodeURI(path).replace(/#/g, '%23');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function renderSelects() {
      const options = ['<option value="">全部分類</option>']
        .concat(state.kinds.map((kind) => `<option value="${kind.id}">${escapeHtml(kind.name)} / ${escapeHtml(kind.character)}</option>`))
        .join('');
      document.getElementById('filterKind').innerHTML = options;
      document.getElementById('itemKind').innerHTML = ['<option value="">未分類</option>']
        .concat(state.kinds.map((kind) => `<option value="${kind.id}">${escapeHtml(kind.name)} / ${escapeHtml(kind.character)}</option>`))
        .join('');
    }

    function previewHtml(item) {
      const preview = assetUrl(item.preview_path);
      const thumb = assetUrl(item.thumb_path);
      if (preview) {
        return `<video src="${preview}" muted loop playsinline preload="metadata" onmouseenter="this.play()" onmouseleave="this.pause(); this.currentTime = 0"></video>`;
      }
      if (thumb) return `<img src="${thumb}" alt="">`;
      return `<div class="status-card">${escapeHtml(item.source_kind || 'pose')}</div>`;
    }

    function renderItems() {
      const body = document.getElementById('itemsBody');
      if (!state.items.length) {
        body.innerHTML = '<tr><td colspan="10">尚無資料。可先按「匯入 GVHMR Demo」或「匯入 VRMA Samples」。</td></tr>';
        return;
      }
      body.innerHTML = state.items.map((item) => {
        const status = statusMap[item.status] || statusMap[0];
        const progress = Math.max(0, Math.min(100, Number(item.progress || 0)));
        const demoHref = `pose_demo.html?id=${item.id}`;
        return `
          <tr>
            <td><input type="checkbox" value="${item.id}" aria-label="選取 ${escapeHtml(item.title)}"></td>
            <td><div class="preview">${previewHtml(item)}</div></td>
            <td>
              <div class="title">${escapeHtml(item.title)}</div>
              <div class="meta">${escapeHtml(item.purpose || '')}</div>
            </td>
            <td>${escapeHtml(item.kind_name || '未分類')}</td>
            <td>
              <span class="badge">${escapeHtml(item.source_kind)}</span>
              <div class="meta">${escapeHtml(item.source_url)}</div>
            </td>
            <td><span class="badge ${status.cls}">${status.label}</span></td>
            <td>
              <div class="progress"><span style="width:${progress}%"></span></div>
              <div class="meta">${progress.toFixed(1)}%</div>
            </td>
            <td>${escapeHtml(item.frames || 0)}</td>
            <td>${escapeHtml(item.create_datetime || '')}</td>
            <td>
              <div class="actions">
                <a class="button primary" href="${demoHref}">預覽</a>
                <button class="blue" data-action="queue" data-id="${item.id}">重跑</button>
                <button class="warn" data-action="queue-vrma" data-id="${item.id}">轉 VRMA</button>
                <button class="bad" data-action="delete" data-id="${item.id}">刪除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function loadData() {
      const params = new URLSearchParams();
      const kind = document.getElementById('filterKind').value;
      const q = document.getElementById('filterQ').value.trim();
      const status = document.getElementById('filterStatus').value;
      if (kind) params.set('kinds_id', kind);
      if (q) params.set('q', q);
      if (status) params.set('status', status);
      const [kindsBody, itemsBody] = await Promise.all([
        apiJson('/api/pose-db/kinds'),
        apiJson(`/api/pose-db/items?${params.toString()}`),
      ]);
      state.kinds = kindsBody.kinds || [];
      state.items = itemsBody.items || [];
      renderSelects();
      if (kind) document.getElementById('filterKind').value = kind;
      renderItems();
    }

    async function runAction(label, fn) {
      try {
        setBusy(true);
        logMessage(`${label}...`);
        await fn();
        await loadData();
        logMessage(`${label}完成`);
      } catch (error) {
        logMessage(`${label}失敗：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    document.getElementById('createKindBtn').addEventListener('click', () => runAction('新增分類', async () => {
      await apiJson('/api/pose-db/kinds', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('kindName').value,
          character: document.getElementById('kindCharacter').value || 'alicia',
        }),
      });
      document.getElementById('kindName').value = '';
    }));

    document.getElementById('createItemBtn').addEventListener('click', () => runAction('建立素材', async () => {
      await apiJson('/api/pose-db/items', {
        method: 'POST',
        body: JSON.stringify({
          kinds_id: document.getElementById('itemKind').value || null,
          title: document.getElementById('itemTitle').value,
          source_kind: document.getElementById('itemSourceKind').value,
          source_url: document.getElementById('itemSourceUrl').value,
          purpose: document.getElementById('itemPurpose').value,
        }),
      });
      document.getElementById('itemTitle').value = '';
      document.getElementById('itemSourceUrl').value = '';
      document.getElementById('itemPurpose').value = '';
    }));

    document.getElementById('importDemoBtn').addEventListener('click', () => runAction('匯入 GVHMR Demo', async () => {
      const result = await apiJson('/api/pose-db/import/demo', { method: 'POST' });
      logMessage(`匯入 GVHMR Demo ${result.result.imported} 筆`);
    }));

    document.getElementById('importVrmaBtn').addEventListener('click', () => runAction('匯入 VRMA Samples', async () => {
      const result = await apiJson('/api/pose-db/import/vrma', { method: 'POST' });
      logMessage(`匯入 VRMA ${result.result.imported} 筆`);
    }));

    document.getElementById('refreshBtn').addEventListener('click', () => runAction('重新整理', loadData));
    document.getElementById('filterQ').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') runAction('搜尋', loadData);
    });
    document.getElementById('filterKind').addEventListener('change', () => runAction('篩選分類', loadData));
    document.getElementById('filterStatus').addEventListener('change', () => runAction('篩選狀態', loadData));

    document.getElementById('itemsBody').addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      if (action === 'delete' && !confirm('確定刪除這筆素材？')) return;
      runAction(action, async () => {
        if (action === 'delete') {
          await apiJson(`/api/pose-db/items/${id}`, { method: 'DELETE' });
        } else {
          await apiJson(`/api/pose-db/items/${id}/${action}`, { method: 'POST' });
        }
      });
    });

    loadData().catch((error) => logMessage(`初始化失敗：${error.message}`));
  </script>
</body>
</html>
