<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M21.1 Character Pool Collector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07110d;
      --panel: #12221a;
      --line: #365746;
      --text: #effff2;
      --muted: #9fb5a7;
      --green: #91ec8d;
      --gold: #ffd66b;
      --bad: #ff8d7b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }

    h1, h2, h3 { margin: 0; }
    h1 { font-size: 22px; }
    h2 { font-size: 17px; color: var(--green); }
    h3 { font-size: 14px; color: var(--gold); }

    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 360px;
      gap: 12px;
      height: calc(100vh - 58px);
      padding: 12px;
    }

    section, aside {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: auto;
    }

    .panel { padding: 14px; }
    .stack { display: grid; gap: 10px; }
    .row { display: grid; gap: 6px; }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, textarea, select, button {
      width: 100%;
      border: 1px solid #54865d;
      border-radius: 6px;
      background: #0d1a14;
      color: var(--text);
      padding: 9px 10px;
      font-weight: 700;
    }

    textarea { min-height: 58px; resize: vertical; }

    button {
      background: #3d823a;
      cursor: pointer;
    }

    button.secondary { background: #14241c; }
    button.bad { background: #6d2b2b; border-color: #a65d5d; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #stage {
      position: relative;
      overflow: hidden;
      background: #0d1729;
    }

    .character-card {
      display: grid;
      gap: 5px;
      padding: 10px;
      border: 1px solid rgba(145, 236, 141, 0.22);
      border-radius: 8px;
      background: rgba(5, 12, 8, 0.55);
      cursor: pointer;
    }

    .character-card.active {
      border-color: var(--green);
      background: rgba(75, 145, 70, 0.3);
    }

    .muted { color: var(--muted); font-size: 12px; }
    .gold { color: var(--gold); }
    .bad-text { color: var(--bad); }

    .motions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .check-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      align-items: center;
    }

    pre {
      min-height: 160px;
      margin: 0;
      padding: 10px;
      border: 1px solid rgba(145, 236, 141, 0.2);
      border-radius: 6px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--gold);
      background: #08110d;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      main { grid-template-columns: 1fr; height: auto; }
      #stage { min-height: 64vh; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>M21.1 Character Pool Collector</h1>
      <div class="muted">匯入 VRM，跑同一套 Alicia Runtime / VRMA 動作，快速檢查相容性。</div>
    </div>
    <output id="status" class="gold">初始化中...</output>
  </header>

  <main>
    <aside class="panel stack">
      <h2>1. 匯入 VRM</h2>
      <form id="uploadForm" class="stack">
        <div class="row">
          <label for="modelFile">VRM 檔案</label>
          <input id="modelFile" name="model" type="file" accept=".vrm,model/gltf-binary" required>
        </div>
        <div class="row">
          <label for="characterId">角色 ID</label>
          <input id="characterId" name="id" placeholder="sample_001">
        </div>
        <div class="row">
          <label for="characterName">角色名稱</label>
          <input id="characterName" name="name" placeholder="Sample Character">
        </div>
        <div class="row">
          <label for="author">作者</label>
          <input id="author" name="author">
        </div>
        <div class="row">
          <label for="sourceUrl">來源 URL</label>
          <input id="sourceUrl" name="sourceUrl" placeholder="下載頁、作者頁、授權頁">
        </div>
        <div class="row">
          <label for="license">授權備註</label>
          <textarea id="license" name="license" placeholder="來源、授權、可否商用等備註"></textarea>
        </div>
        <label><input name="allowCommercialUse" type="checkbox"> 允許商用</label>
        <label><input name="allowRedistribution" type="checkbox"> 允許再散布</label>
        <label><input name="allowModification" type="checkbox"> 允許修改</label>
        <button type="submit">匯入角色</button>
      </form>

      <hr>
      <h2>2. 角色池</h2>
      <div id="characterList" class="stack"></div>
    </aside>

    <section id="stage" aria-label="character preview"></section>

    <aside class="panel stack">
      <h2>3. 動作相容測試</h2>
      <div class="motions">
        <button data-motion="idle">idle</button>
        <button data-motion="walk">walk</button>
        <button data-motion="run">run</button>
        <button data-motion="aim">aim</button>
        <button data-motion="shoot">shoot</button>
        <button data-motion="attack">attack</button>
      </div>

      <h3>Checklist: battle_basic_v1</h3>
      <div id="checklist" class="stack"></div>
      <button id="saveResultButton" type="button">儲存測試結果</button>
      <pre id="debug"></pre>
    </aside>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.js",
      "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

    const $ = (id) => document.getElementById(id);
    const MOTIONS = {
      walk: 'motions/showcase/davinci2_walking.vrma',
      run: 'motions/showcase/davinci3_standardRun.vrma',
      aim: 'motions/showcase/davinci4_aimingGun.vrma',
      shoot: 'motions/showcase/shoot_pose_190.vrma',
      attack: 'motions/showcase/punch_right.vrma'
    };
    const CHECKS = ['idle', 'walk', 'run', 'jump', 'attack', 'aim', 'shoot', 'hit', 'death', 'expression', 'lookAt'];
    const STATUS_OPTIONS = ['not_tested', 'ok', 'arm_offset', 'weapon_misaligned', 'leg_issue', 'expression_issue', 'lookat_issue', 'failed'];

    let characters = [];
    let currentCharacter = null;

    class CharacterPreview {
      constructor(container) {
        this.container = container;
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x0d1729);
        this.camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
        this.camera.position.set(0, 1.25, 3.2);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        this.renderer.outputColorSpace = THREE.SRGBColorSpace;
        this.container.appendChild(this.renderer.domElement);
        this.controls = new OrbitControls(this.camera, this.renderer.domElement);
        this.controls.target.set(0, 1.05, 0);
        this.controls.enableDamping = true;
        this.scene.add(new THREE.HemisphereLight(0xffffff, 0x334455, 1.6));
        const light = new THREE.DirectionalLight(0xffffff, 1.8);
        light.position.set(1.5, 3, 2);
        this.scene.add(light);
        const grid = new THREE.GridHelper(10, 20, 0x5f7896, 0x26394f);
        this.scene.add(grid);
        this.clock = new THREE.Clock();
        this.vrm = null;
        this.mixer = null;
        this.action = null;
        new ResizeObserver(() => this.resize()).observe(container);
        this.resize();
        this.animate();
      }

      async loadModel(url) {
        if (this.action) this.action.stop();
        this.mixer = null;
        if (this.vrm) this.scene.remove(this.vrm.scene);
        const loader = new GLTFLoader();
        loader.crossOrigin = 'anonymous';
        loader.register((parser) => new VRMLoaderPlugin(parser));
        const gltf = await loader.loadAsync(url);
        this.vrm = gltf.userData.vrm;
        VRMUtils.removeUnnecessaryVertices(this.vrm.scene);
        this.vrm.scene.traverse((obj) => { obj.frustumCulled = false; });
        this.vrm.scene.rotation.y = Math.PI;
        this.scene.add(this.vrm.scene);
      }

      async play(url) {
        if (!this.vrm) throw new Error('請先選擇角色');
        if (this.action) this.action.stop();
        this.mixer = null;
        if (!url) return;
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMAnimationLoaderPlugin(parser));
        const gltf = await loader.loadAsync(url);
        const animation = gltf.userData.vrmAnimations?.[0];
        if (!animation) throw new Error(`找不到 VRMA 動畫: ${url}`);
        const clip = createVRMAnimationClip(animation, this.vrm);
        this.mixer = new THREE.AnimationMixer(this.vrm.scene);
        this.action = this.mixer.clipAction(clip);
        this.action.setLoop(THREE.LoopRepeat, Infinity);
        this.action.play();
      }

      resize() {
        const width = Math.max(1, this.container.clientWidth);
        const height = Math.max(1, this.container.clientHeight);
        this.camera.aspect = width / height;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(width, height, false);
      }

      animate() {
        requestAnimationFrame(() => this.animate());
        const delta = Math.min(0.05, this.clock.getDelta());
        this.mixer?.update(delta);
        this.vrm?.update?.(delta);
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
      }
    }

    const preview = new CharacterPreview($('stage'));

    function setStatus(text) {
      $('status').textContent = text;
    }

    function setDebug(payload) {
      $('debug').textContent = JSON.stringify(payload, null, 2);
    }

    async function apiJson(url, options) {
      const response = await fetch(url, options);
      const body = await response.json();
      if (!response.ok || body.ok === false) throw new Error(body.error || `HTTP ${response.status}`);
      return body;
    }

    function renderCharacters() {
      const list = $('characterList');
      if (!characters.length) {
        list.innerHTML = '<div class="muted">尚未匯入角色。</div>';
        return;
      }
      list.innerHTML = characters.map((item) => `
        <button class="character-card ${currentCharacter?.id === item.id ? 'active' : ''}" data-character-id="${item.id}" type="button">
          <strong>${item.name || item.id}</strong>
          <span class="muted">${item.id} / ${item.status || 'testing'}</span>
          <span class="muted">${item.author || 'author 未填'}</span>
        </button>
      `).join('');
      list.querySelectorAll('[data-character-id]').forEach((button) => {
        button.addEventListener('click', () => selectCharacter(button.dataset.characterId).catch(showError));
      });
    }

    function renderChecklist() {
      const result = currentCharacter?.testResults?.battle_basic_v1?.result || {};
      $('checklist').innerHTML = CHECKS.map((name) => `
        <label class="check-row">
          <span>${name}</span>
          <select data-check="${name}">
            ${STATUS_OPTIONS.map((value) => `<option value="${value}" ${result[name] === value ? 'selected' : ''}>${value}</option>`).join('')}
          </select>
        </label>
      `).join('');
    }

    async function loadCharacters() {
      const body = await apiJson('/api/characters');
      characters = body.characters || [];
      renderCharacters();
      if (!currentCharacter && characters[0]) await selectCharacter(characters[0].id);
    }

    async function selectCharacter(id) {
      currentCharacter = characters.find((item) => item.id === id);
      if (!currentCharacter) return;
      setStatus(`載入角色 ${currentCharacter.name || currentCharacter.id}...`);
      await preview.loadModel(currentCharacter.modelUrl);
      await preview.play('');
      renderCharacters();
      renderChecklist();
      setDebug(currentCharacter);
      setStatus(`已載入 ${currentCharacter.name || currentCharacter.id}`);
    }

    async function importCharacter(event) {
      event.preventDefault();
      const form = $('uploadForm');
      const body = await apiJson('/api/characters/import', {
        method: 'POST',
        body: new FormData(form)
      });
      form.reset();
      await loadCharacters();
      await selectCharacter(body.character.id);
    }

    async function playMotion(name) {
      if (!currentCharacter) throw new Error('請先選角色');
      setStatus(`測試 ${name}...`);
      await preview.play(MOTIONS[name] || '');
      const select = document.querySelector(`[data-check="${name}"]`);
      if (select && select.value === 'not_tested') select.value = 'ok';
      setStatus(`${currentCharacter.name || currentCharacter.id} / ${name}`);
    }

    async function saveResults() {
      if (!currentCharacter) throw new Error('請先選角色');
      const result = {};
      document.querySelectorAll('[data-check]').forEach((select) => {
        result[select.dataset.check] = select.value;
      });
      const payload = {
        testResults: {
          ...(currentCharacter.testResults || {}),
          battle_basic_v1: {
            updatedAt: new Date().toISOString(),
            result
          }
        }
      };
      const body = await apiJson(`/api/characters/${encodeURIComponent(currentCharacter.id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      currentCharacter = body.character;
      characters = characters.map((item) => item.id === currentCharacter.id ? currentCharacter : item);
      renderCharacters();
      setDebug(currentCharacter);
      setStatus('測試結果已儲存');
    }

    function showError(error) {
      console.error(error);
      setStatus(`失敗：${error.message}`);
      $('debug').textContent = error.stack || String(error);
    }

    function init() {
      renderChecklist();
      $('uploadForm').addEventListener('submit', (event) => importCharacter(event).catch(showError));
      $('saveResultButton').addEventListener('click', () => saveResults().catch(showError));
      document.querySelectorAll('[data-motion]').forEach((button) => {
        button.addEventListener('click', () => playMotion(button.dataset.motion).catch(showError));
      });
      loadCharacters().then(() => setStatus('Ready')).catch(showError);
    }

    init();
  </script>
</body>
</html>
